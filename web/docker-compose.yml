version: '3.8'

networks:
  snb_net:
    driver: bridge

services:
  bastion:
    build:
      context: .
      dockerfile: bastion/Dockerfile
    networks:
      - snb_net
    restart: unless-stopped
    ports:
      - "192.168.3.5:22:22"
      - "192.168.3.7:22:22"
      - "192.168.3.12:22:22"

  dns:
    build:
      context: .
      dockerfile: dns/Dockerfile
    networks:
      - snb_net
    environment:
      - TEAM_IP=192.168.3.12
    restart: unless-stopped
    ports:
      - "192.168.3.12:53:53/udp"
      - "192.168.3.12:53:53/tcp"

  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    networks:
      - snb_net
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: national_bank
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d national_bank"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - snb_net
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/national_bank
      - FRONTEND_URL=https://192.168.3.5
      - JWT_SECRET=5d7845ac6ee7cfffafc5fe5f35cf666d
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    networks:
      - snb_net
    environment:
      - NEXT_PUBLIC_API_URL=https://192.168.3.5/api
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
    networks:
      - snb_net
    environment:
      - CERT_DOMAIN=ca.ncaecybergames.org
      - CERT_EMAIL=admin@ca.ncaecybergames.org
    depends_on:
      - frontend
      - backend
    ports:
      - "192.168.3.5:80:80"
      - "192.168.3.5:443:443"

volumes:
  pgdata: